services:
  mysql:
    image: mysql:8.0
    container_name: perfulandia-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/databases.sql:/docker-entrypoint-initdb.d/databases.sql

volumes:
  mysql-data: